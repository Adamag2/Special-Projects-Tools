<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retail / B2B Dashboard — Atomix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1118;--bg2:#111820;--bg3:#172030;--bg4:#1d2a3a;
  --border:#1e2d3d;--border2:#253549;
  --green:#3EBD84;--green-dim:#0d2218;--green-glow:rgba(62,189,132,0.18);
  --teal:#2dd4bf;--teal-dim:#0a2220;
  --blue:#4A9FD4;--blue-dim:#0d1e30;
  --amber:#f59e0b;--amber-dim:#251a05;
  --red:#f87171;--red-dim:#250d0d;
  --purple:#a78bfa;--purple-dim:#1a1030;
  --text:#e8f0f8;--text2:#7a9ab5;--text3:#3d5570;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{background:rgba(12,17,24,0.95);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px}
.topnav a{color:var(--text3);font-size:12px;font-weight:600;text-decoration:none;transition:color .15s}
.topnav a:hover{color:var(--green)}
.sync-badge{margin-left:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
.sync-badge.synced{color:var(--green);background:var(--green-dim)}
.sync-badge.syncing{color:var(--amber);background:var(--amber-dim)}
.sync-badge.offline{color:var(--text3);background:var(--bg3)}
.header{padding:24px 24px 0;max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.header-left p{font-size:13px;color:var(--text2);margin-top:4px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:1.5px solid;transition:all .15s}
.btn-green{color:var(--green);border-color:var(--green);background:transparent}
.btn-green:hover{background:var(--green-dim)}
.btn-teal{color:var(--teal);border-color:var(--teal);background:transparent}
.btn-teal:hover{background:var(--teal-dim)}
.btn-ghost{color:var(--text3);border-color:var(--border2);background:transparent}
.btn-ghost:hover{color:var(--text2);background:var(--bg3)}
.btn-solid{color:#0c1118;background:var(--green);border-color:var(--green);font-weight:700}
.btn-solid:hover{opacity:.88}
.mode-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.mode-nate{background:var(--teal-dim);color:var(--teal)}
.mode-normal{background:var(--bg3);color:var(--text3)}
.main{max-width:1100px;margin:0 auto;padding:20px 24px 60px}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:800}
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.pipeline-col{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.col-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-title{font-size:12px;font-weight:700;flex:1}
.col-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;background:var(--bg3)}
.col-body{padding:10px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.order-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.order-card:hover{border-color:var(--teal);transform:translateY(-1px)}
.order-brand{font-size:13px;font-weight:700;margin-bottom:4px}
.order-meta{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.order-tags{display:flex;gap:4px;flex-wrap:wrap}
.order-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.tag-due-ok{background:rgba(45,212,191,0.1);color:var(--teal)}
.tag-due-warn{background:var(--amber-dim);color:var(--amber)}
.tag-due-over{background:var(--red-dim);color:var(--red)}
.tag-assignee{background:var(--bg4);color:var(--text2)}
.tag-type{background:var(--blue-dim);color:var(--blue)}
.empty-col{font-size:12px;color:var(--text3);text-align:center;padding:20px 10px;font-style:italic}
.week-section{margin-bottom:20px}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.week-title{font-size:15px;font-weight:700}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{border:1px solid var(--border2);background:var(--bg3);border-radius:7px;padding:5px 11px;cursor:pointer;font-size:13px;color:var(--text);font-family:'Inter',sans-serif}
.week-nav button:hover{background:var(--bg4)}
.week-label{font-size:12px;font-weight:600;min-width:160px;text-align:center;color:var(--text2)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-height:80px}
.day-head{padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg3);text-align:center}
.day-name{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.day-date{font-size:11px;font-weight:600;color:var(--text2)}
.day-col.today .day-head{background:var(--green-dim)}
.day-col.today .day-name{color:var(--green)}
.day-orders{padding:6px;display:flex;flex-direction:column;gap:4px}
.day-order-chip{font-size:10px;font-weight:600;padding:3px 6px;border-radius:6px;cursor:pointer;transition:opacity .15s;border:1px solid transparent}
.day-order-chip:hover{opacity:.8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.8);width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:9px;font-size:13px;background:var(--bg3);color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.act-row{display:flex;gap:8px;margin-top:18px}
.btn-cancel{padding:9px 16px;border:1px solid var(--border2);border-radius:9px;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:'Inter',sans-serif}
.btn-cancel:hover{background:var(--bg3)}
.btn-save{flex:1;padding:9px;border:none;border-radius:9px;background:var(--teal);cursor:pointer;font-size:13px;color:#0c1118;font-weight:700;font-family:'Inter',sans-serif}
.btn-save:hover{opacity:.88}
.btn-delete{padding:9px 14px;border:1px solid rgba(248,113,113,.3);border-radius:9px;background:transparent;cursor:pointer;font-size:13px;color:var(--red);font-family:'Inter',sans-serif}
.btn-delete:hover{background:var(--red-dim)}
.stage-btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.stage-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.stage-btn.active{color:#0c1118}
.pin-dots{display:flex;justify-content:center;gap:12px;margin:14px 0 4px}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--border2);transition:background .12s}
.pin-dot.filled{background:var(--teal)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.kbtn{padding:13px;border:1px solid var(--border2);border-radius:9px;background:var(--bg3);cursor:pointer;font-size:17px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif;transition:background .1s}
.kbtn:hover{background:var(--bg4)}
.kbtn.sm{font-size:13px;color:var(--text2)}
.pin-err{font-size:12px;color:var(--red);min-height:18px;margin-top:4px;text-align:center}
@media(max-width:900px){.pipeline{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.pipeline{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(3,1fr)}.week-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCXWwp346vnAQmarUYocvb7DSTana0jNwA",
    authDomain: "atomix-tools.firebaseapp.com",
    projectId: "atomix-tools",
    storageBucket: "atomix-tools.firebasestorage.app",
    messagingSenderId: "211594945190",
    appId: "1:211594945190:web:bf70681d9335816984ca67"
  };
  const app = initializeApp(firebaseConfig);

  window._fsDoc=doc;window._fsSetDoc=setDoc;window._fsGetDoc=getDoc;window._fsOnSnapshot=onSnapshot;

</script>

<div class="topnav">
  <a href="index.html">← All Tools</a>
  <span style="width:1px;height:14px;background:var(--border2);display:inline-block"></span>
  <span style="font-size:12px;color:var(--text3)">Retail / B2B Dashboard</span>
  <div class="sync-badge offline" id="syncBadge">⟳ Connecting...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>📦 Retail / B2B Dashboard</h1>
    <p>Order pipeline — track from incoming to shipped</p>
  </div>
  <div class="header-right">
    <span class="mode-badge mode-normal" id="modeBadge">Standard</span>
    <button class="btn btn-teal" id="modeBtn" onclick="handleModeBtn()">🔓 Nate Mode</button>
    <button class="btn btn-solid" onclick="openAddOrder()">+ New Order</button>
  </div>
</div>

<div class="main">
  <div class="stats-row" id="statsRow"></div>

  <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:10px">
    Pipeline
    <span style="flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)"></span>
  </div>
  <div class="pipeline" id="pipeline"></div>

  <div class="week-section">
    <div class="week-header">
      <div class="week-title">📅 Weekly View</div>
      <div class="week-nav">
        <button id="wPrev">←</button>
        <div class="week-label" id="weekLabel"></div>
        <button id="wNext">→</button>
      </div>

</div>

<!-- Add/Edit Order Modal -->
<div class="overlay" id="orderOverlay">
  <div class="modal">
    <h3 id="modalTitle">New Order</h3>
    <div class="modal-sub">Fill in the order details below</div>
    <div class="grid-2">
      <div class="field"><label>Brand</label>
        <select id="o-brand" onchange="onBrandChange()">
          <option value="">-- Select --</option>
          <option>IQ Bar</option><option>IQMIX</option><option>IQJOE</option>
          <option>Crazy Mountain</option><option>SkinnyPop</option><option>RXBAR</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field"><label>Order Type</label>
        <select id="o-type">
          <option>B2B</option><option>Retail</option><option>DTC</option><option>Amazon FBA</option><option>Special Project</option>
        </select>
      </div>
    </div>
    <div class="field" id="customBrandField" style="display:none"><label>Custom Brand Name</label><input id="o-custbrand" type="text" placeholder="Brand name"/></div>
    <div class="grid-2">
      <div class="field"><label>Due Date</label><input id="o-due" type="date"/></div>
      <div class="field"><label>Units / Cases</label><input id="o-units" type="text" placeholder="e.g. 500 cases"/></div>
    </div>
    <div class="field"><label>Assigned To</label><input id="o-assignee" type="text" placeholder="Team member name"/></div>
    <div class="field"><label>Stage</label>
      <div class="stage-btn-row" id="stageBtns"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="o-notes" rows="2" placeholder="Any special instructions…"></textarea></div>
    <div class="act-row" id="modalActRow">
      <button class="btn-cancel" onclick="closeOrderModal()">Cancel</button>
      <button class="btn-save" onclick="saveOrder()">Save Order</button>
    </div>
  </div>
</div>

<!-- PIN Modal -->
<div class="overlay" id="pinOverlay">
  <div class="modal" style="width:300px;text-align:center">
    <h3>Nate Mode</h3>
    <div class="modal-sub">Enter 4-digit PIN for full access</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="keypad">
      <button class="kbtn" data-k="1">1</button><button class="kbtn" data-k="2">2</button><button class="kbtn" data-k="3">3</button>
      <button class="kbtn" data-k="4">4</button><button class="kbtn" data-k="5">5</button><button class="kbtn" data-k="6">6</button>
      <button class="kbtn" data-k="7">7</button><button class="kbtn" data-k="8">8</button><button class="kbtn" data-k="9">9</button>
      <button class="kbtn sm" data-k="cancel">Cancel</button>
      <button class="kbtn" data-k="0">0</button>
      <button class="kbtn sm" data-k="back">⌫</button>
    </div>
  </div>
</div>

<script>
const NATE_PIN='0202';
const STAGES=['Incoming / Received','In Prep','Staged / Ready','Shipped / Complete'];
const STAGE_COLORS={'Incoming / Received':'#3b82f6','In Prep':'#f59e0b','Staged / Ready':'#8b5cf6','Shipped / Complete':'#10b981'};
const SK='atomix_orders';

let orders=[],isNate=false,pinBuf='',editingId=null,selectedStage='Incoming / Received';
let weekOffset=0,saveTimeout=null;

// ── Firebase ──────────────────────────────────────────────────────
function setSyncStatus(s){
  const el=document.getElementById('syncBadge');
  if(s==='synced'){el.textContent='✓ Synced';el.className='sync-badge synced';}
  else if(s==='syncing'){el.textContent='⟳ Saving...';el.className='sync-badge syncing';}
  else{el.textContent='● Offline';el.className='sync-badge offline';}
}

async function saveData(){
  const payload={orders,updatedAt:Date.now()};
  try{localStorage.setItem(SK,JSON.stringify(orders));}catch(e){}
  if(window._firestoreReady){
    setSyncStatus('syncing');
    clearTimeout(saveTimeout);
    saveTimeout=setTimeout(async()=>{
      try{
        await window._fsSetDoc(window._fsDoc(window._firestore,'atomix','retail_dashboard'),payload);
        setSyncStatus('synced');
      }catch(e){console.error(e);setSyncStatus('offline');}
    },600);
  }
}

async function loadData(){
  if(window._firestoreReady){
    try{
      const snap=await window._fsGetDoc(window._fsDoc(window._firestore,'atomix','retail_dashboard'));
      if(snap.exists()){
        orders=snap.data().orders||[];setSyncStatus('synced');
        window._fsOnSnapshot(window._fsDoc(window._firestore,'atomix','retail_dashboard'),(snap)=>{
          if(snap.exists()){orders=snap.data().orders||[];render();setSyncStatus('synced');}
        });
        return;
      }
    }catch(e){console.warn('Firebase load failed:',e);setSyncStatus('offline');}
  }
  try{const s=localStorage.getItem(SK);if(s)orders=JSON.parse(s);}catch(e){}
}

// ── PIN ───────────────────────────────────────────────────────────
function handleModeBtn(){if(isNate){exitNate();}else{openPinModal();}}
function openPinModal(){pinBuf='';document.getElementById('pinErr').textContent='';updateDots();document.getElementById('pinOverlay').classList.add('open');}
function exitNate(){isNate=false;document.getElementById('modeBadge').textContent='Standard';document.getElementById('modeBadge').className='mode-badge mode-normal';document.getElementById('modeBtn').textContent='🔓 Nate Mode';render();}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);}
document.querySelectorAll('.kbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const k=btn.dataset.k;
    if(k==='cancel'){document.getElementById('pinOverlay').classList.remove('open');return;}
    if(k==='back'){pinBuf=pinBuf.slice(0,-1);updateDots();return;}
    if(pinBuf.length>=4)return;
    pinBuf+=k;updateDots();
    if(pinBuf.length===4){setTimeout(()=>{
      if(pinBuf===NATE_PIN){document.getElementById('pinOverlay').classList.remove('open');isNate=true;document.getElementById('modeBadge').textContent='✓ Nate Mode';document.getElementById('modeBadge').className='mode-badge mode-nate';document.getElementById('modeBtn').textContent='🔒 Exit';render();}
      else{document.getElementById('pinErr').textContent='Incorrect PIN';pinBuf='';updateDots();}
    },120);}
  });
});

// ── Order helpers ─────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function today(){return new Date().toISOString().split('T')[0];}
function daysUntil(s){if(!s)return null;return Math.ceil((new Date(s)-new Date(today()))/86400000);}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${m}/${d}/${y.slice(2)}`;}

function onBrandChange(){document.getElementById('customBrandField').style.display=document.getElementById('o-brand').value==='Other'?'block':'none';}

function buildStageBtns(active){
  return STAGES.map(s=>{
    const col=STAGE_COLORS[s];
    const isActive=s===active;
    return`<button class="stage-btn${isActive?' active':''}" style="${isActive?`background:${col};border-color:${col};color:#0c1118`:`border-color:${col}33;color:${col}`}" onclick="selectStage('${s}')">${s}</button>`;
  }).join('');
}
function selectStage(s){selectedStage=s;document.getElementById('stageBtns').innerHTML=buildStageBtns(s);}

function openAddOrder(){
  editingId=null;selectedStage='Incoming / Received';
  document.getElementById('modalTitle').textContent='New Order';
  document.getElementById('o-brand').value='';
  document.getElementById('o-custbrand').value='';
  document.getElementById('o-type').value='B2B';
  document.getElementById('o-due').value='';
  document.getElementById('o-units').value='';
  document.getElementById('o-assignee').value='';
  document.getElementById('o-notes').value='';
  document.getElementById('customBrandField').style.display='none';
  document.getElementById('stageBtns').innerHTML=buildStageBtns(selectedStage);
  document.getElementById('modalActRow').innerHTML='<button class="btn-cancel" onclick="closeOrderModal()">Cancel</button><button class="btn-save" onclick="saveOrder()">Save Order</button>';
  document.getElementById('orderOverlay').classList.add('open');
}

function openEditOrder(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  editingId=id;selectedStage=o.stage;
  document.getElementById('modalTitle').textContent='Edit Order';
  document.getElementById('o-brand').value=o.brand;
  document.getElementById('o-custbrand').value=o.customBrand||'';
  document.getElementById('o-type').value=o.type;
  document.getElementById('o-due').value=o.dueDate||'';
  document.getElementById('o-units').value=o.units||'';
  document.getElementById('o-assignee').value=o.assignee||'';
  document.getElementById('o-notes').value=o.notes||'';
  document.getElementById('customBrandField').style.display=o.brand==='Other'?'block':'none';
  document.getElementById('stageBtns').innerHTML=buildStageBtns(selectedStage);
  document.getElementById('modalActRow').innerHTML=`<button class="btn-delete" onclick="deleteOrder('${id}')">Delete</button><button class="btn-cancel" onclick="closeOrderModal()">Cancel</button><button class="btn-save" onclick="saveOrder()">Save</button>`;
  document.getElementById('orderOverlay').classList.add('open');
}

function closeOrderModal(){document.getElementById('orderOverlay').classList.remove('open');editingId=null;}

function saveOrder(){
  const brand=document.getElementById('o-brand').value;
  if(!brand){alert('Please select a brand.');return;}
  const o={
    id:editingId||uid(),
    brand,
    customBrand:brand==='Other'?document.getElementById('o-custbrand').value.trim():'',
    type:document.getElementById('o-type').value,
    dueDate:document.getElementById('o-due').value,
    units:document.getElementById('o-units').value.trim(),
    assignee:document.getElementById('o-assignee').value.trim(),
    notes:document.getElementById('o-notes').value.trim(),
    stage:selectedStage,
    createdAt:editingId?(orders.find(x=>x.id===editingId)?.createdAt||Date.now()):Date.now()
  };
  if(editingId){orders=orders.map(x=>x.id===editingId?o:x);}
  else{orders.push(o);}
  saveData();closeOrderModal();render();
}

function deleteOrder(id){
  if(!confirm('Delete this order?'))return;
  orders=orders.filter(x=>x.id!==id);saveData();closeOrderModal();render();
}

function advanceStage(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  const idx=STAGES.indexOf(o.stage);if(idx<STAGES.length-1){o.stage=STAGES[idx+1];saveData();render();}
}

// ── Week helpers ──────────────────────────────────────────────────
function getWeekStart(offset){
  const d=new Date();d.setHours(0,0,0,0);
  const day=d.getDay();const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1)+(offset*7));
  return mon;
}
function getWeekDays(offset){
  const mon=getWeekStart(offset);const days=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  return days;
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  renderStats();renderPipeline();renderWeek();
}

function renderStats(){
  const active=orders.filter(o=>o.stage!=='Shipped / Complete');
  const urgent=active.filter(o=>{const d=daysUntil(o.dueDate);return d!==null&&d<=1;});
  const shipped=orders.filter(o=>o.stage==='Shipped / Complete');
  const today_str=today();
  const dueToday=active.filter(o=>o.dueDate===today_str);
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Active Orders</div><div class="stat-val" style="color:var(--teal)">${active.length}</div></div>
    <div class="stat-card"><div class="stat-label">Due Today</div><div class="stat-val" style="color:var(--amber)">${dueToday.length}</div></div>
    <div class="stat-card"><div class="stat-label">Urgent</div><div class="stat-val" style="color:var(--red)">${urgent.length}</div></div>
    <div class="stat-card"><div class="stat-label">Shipped</div><div class="stat-val" style="color:var(--green)">${shipped.length}</div></div>
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val">${orders.length}</div></div>`;
}

function renderPipeline(){
  const el=document.getElementById('pipeline');el.innerHTML='';
  STAGES.forEach(stage=>{
    const col=STAGE_COLORS[stage];
    const stageOrders=orders.filter(o=>o.stage===stage);
    const div=document.createElement('div');div.className='pipeline-col';
    div.innerHTML=`<div class="col-head"><div class="col-dot" style="background:${col}"></div><div class="col-title">${stage}</div><div class="col-count" style="color:${col}">${stageOrders.length}</div></div><div class="col-body" id="col-${stage.replace(/ \//g,'-').replace(/ /g,'-')}"></div>`;
    el.appendChild(div);
    const body=div.querySelector('.col-body');
    if(!stageOrders.length){body.innerHTML='<div class="empty-col">No orders</div>';return;}
    stageOrders.forEach(o=>{
      const brand=o.brand==='Other'?o.customBrand:o.brand;
      const days=daysUntil(o.dueDate);
      const overdue=days!==null&&days<0,dueToday2=days===0,urgent=days!==null&&days<=1&&days>=0;
      const tagClass=overdue?'tag-due-over':urgent||dueToday2?'tag-due-warn':'tag-due-ok';
      const dueStr=o.dueDate?(overdue?`Overdue ${Math.abs(days)}d`:dueToday2?'Due Today':days===1?'Due Tomorrow':`Due ${fmtDate(o.dueDate)}`):null;
      const card=document.createElement('div');card.className='order-card';
      card.innerHTML=`<div class="order-brand">${brand||'—'}</div>
        <div class="order-meta"><span>${o.type}</span>${o.units?`<span>${o.units}</span>`:''}</div>
        <div class="order-tags">
          <span class="order-tag tag-type">${o.type}</span>
          ${dueStr?`<span class="order-tag ${tagClass}">${dueStr}</span>`:''}
          ${o.assignee?`<span class="order-tag tag-assignee">👤 ${o.assignee}</span>`:''}
          ${stage!=='Shipped / Complete'?`<button onclick="event.stopPropagation();advanceStage('${o.id}')" style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;border:none;background:${col}22;color:${col};cursor:pointer">→ Next</button>`:''}
        </div>`;
      card.addEventListener('click',()=>{if(isNate)openEditOrder(o.id);});
      body.appendChild(card);
    });
  });
}

function renderWeek(){
  const days=getWeekDays(weekOffset);
  const mon=days[0],sun=days[6];
  document.getElementById('weekLabel').textContent=`${mon.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${sun.toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;
  const grid=document.getElementById('weekGrid');grid.innerHTML='';
  const todayStr=today();
  days.forEach(d=>{
    const ds=d.toISOString().split('T')[0];
    const isToday=ds===todayStr;
    const dayOrders=orders.filter(o=>o.dueDate===ds);
    const col=document.createElement('div');col.className='day-col'+(isToday?' today':'');
    col.innerHTML=`<div class="day-head"><div class="day-name">${d.toLocaleDateString(undefined,{weekday:'short'})}</div><div class="day-date">${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div></div><div class="day-orders" id="dday-${ds}"></div>`;
    grid.appendChild(col);
    const body=col.querySelector('.day-orders');
    dayOrders.forEach(o=>{
      const brand=o.brand==='Other'?o.customBrand:o.brand;
      const col2=STAGE_COLORS[o.stage]||'#6b7280';
      const chip=document.createElement('div');chip.className='day-order-chip';
      chip.style.cssText=`background:${col2}18;color:${col2};border-color:${col2}33`;
      chip.textContent=brand||'Order';
      chip.addEventListener('click',()=>{if(isNate)openEditOrder(o.id);else openEditOrder(o.id);});
      body.appendChild(chip);
    });
  });
}

document.getElementById('wPrev').addEventListener('click',()=>{weekOffset--;renderWeek();});
document.getElementById('wNext').addEventListener('click',()=>{weekOffset++;renderWeek();});

function init(){loadData().then(()=>render());}
if(window._firestoreReady){init();}
else{window.addEventListener('firestore-ready',init,{once:true});setTimeout(()=>{if(!window._firestoreReady)init();},3000);}
</script>
</body>
</html>
