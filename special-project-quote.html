<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Special Project Quote — Atomix</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f8;color:#1a1a1a;min-height:100vh}
.topnav{background:#0d1f1a;padding:14px 28px;display:flex;align-items:center;gap:16px}
.topnav a{color:#6ee7b7;font-size:13px;text-decoration:none;opacity:.8}
.topnav a:hover{opacity:1}
.topnav .logo{display:flex;align-items:center;gap:10px}
.topnav .logo-icon{width:30px;height:30px;border:2px solid #6ee7b7;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#6ee7b7;font-size:14px}
.topnav .logo-text{color:white;font-size:17px;font-weight:700;letter-spacing:1px}
.topnav .sep{color:#4b5563}
.page-header{background:linear-gradient(135deg,#1a5c4a 0%,#0d3d2e 100%);color:white;padding:32px 36px 28px}
.page-header h1{font-size:24px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:13px;opacity:.7}
.container{max-width:860px;margin:32px auto;padding:0 20px 60px}
.card{background:white;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:28px;margin-bottom:20px}
.card h2{font-size:13px;font-weight:700;color:#1a5c4a;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid #d1fae5;padding-bottom:8px;margin-bottom:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.col-span-2{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:7px;padding:8px 11px;font-size:13px;color:#1a1a1a;background:white;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#1a5c4a;box-shadow:0 0 0 3px rgba(26,92,74,.08)}
.readonly{background:#f3f4f6;color:#374151;font-weight:600}
.mat-table{width:100%;border-collapse:collapse}
.mat-table th{background:#f3f4f6;font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;padding:9px 10px;border:1px solid #e5e7eb;text-align:left}
.mat-table td{padding:7px 8px;border:1px solid #e5e7eb;vertical-align:middle}
.mat-table tr:nth-child(even) td{background:#fafafa}
.mat-table select,.mat-table input{border-radius:5px;font-size:13px;padding:6px 8px}
.btn-ghost{background:none;border:1px solid #d1d5db;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;color:#374151;transition:all .15s}
.btn-ghost:hover{border-color:#1a5c4a;color:#1a5c4a}
.btn-green{background:#1a5c4a;color:white;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-green:hover{background:#155040}
.btn-red{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:2px 6px}
.total-bar{display:flex;justify-content:flex-end;margin-top:16px}
.total-box{display:flex;border:1px solid #d1d5db;border-radius:8px;overflow:hidden}
.total-label{padding:12px 24px;font-weight:700;font-size:14px;background:#f9fafb}
.total-amount{padding:12px 24px;background:#d1fae5;font-weight:700;font-size:14px;color:#065f46;min-width:100px;text-align:right}
.actions{display:flex;gap:12px;justify-content:flex-end;margin-top:10px}
.mat-mgr{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:16px;margin-bottom:16px}
.mat-mgr h3{font-size:12px;font-weight:700;color:#1a5c4a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.mat-mgr-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.mat-mgr-row input{flex:2}
@media print{
  body{background:white}
  .topnav,.actions,.no-print{display:none!important}
  .container{margin:0;padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #e5e7eb;margin-bottom:12px;page-break-inside:avoid}
  .page-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}.col-span-2{grid-column:1}}
</style>
</head>
<body>

<div class="topnav">
  <div class="logo"><div class="logo-icon">⬡</div><span class="logo-text">atomix</span></div>
  <span class="sep">›</span>
  <a href="index.html">← All Tools</a>
</div>

<div class="page-header">
  <h1>💰 Special Project Quote</h1>
  <p>Build and export client quotes with live cost calculations</p>
</div>

<div class="container">

  <div class="card">
    <h2>Project Info</h2>
    <div class="grid-2">
      <div><label>Client Name</label><input id="client" type="text" placeholder="e.g. Crazy Mountain"/></div>
      <div><label>Date</label><input id="date" type="date"/></div>
      <div class="col-span-2"><label>Project Reference</label><input id="projRef" type="text" placeholder="e.g. Crazy Mountain Barcoding B2B POS Inventory"/></div>
    </div>
  </div>

  <div class="card">
    <h2>Labor</h2>
    <div class="grid-3">
      <div><label>Quoted Hours</label><input id="hours" type="number" min="0" step="0.5" value="1" oninput="calcTotals()"/></div>
      <div><label>Labor Rate ($/hr)</label><input id="laborRate" type="number" min="0" value="60" oninput="calcTotals()"/></div>
      <div><label>Labor Total</label><input id="laborTotal" class="readonly" readonly value="$60.00"/></div>
    </div>
  </div>

  <div class="card">
    <h2>Materials</h2>
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn-ghost" onclick="toggleMatMgr()">⚙ Manage Materials List</button>
    </div>
    <div id="matMgr" class="mat-mgr" style="display:none">
      <h3>Materials Catalog — edit prices or add items</h3>
      <div id="matMgrRows"></div>
      <div class="mat-mgr-row" style="margin-top:10px">
        <select id="newMatCat" style="flex:1;max-width:130px">
          <option value="Labels">Labels</option><option value="Poly Mailers">Poly Mailers</option>
          <option value="Boxes">Boxes</option><option value="Cold Packaging">Cold Packaging</option>
          <option value="Services">Services</option><option value="Other">Other</option>
        </select>
        <input id="newMatName" placeholder="Material name" style="flex:3"/>
        <input id="newMatCost" placeholder="$/unit" type="number" step="0.01" style="max-width:90px"/>
        <button class="btn-green" onclick="addCustomMat()" style="white-space:nowrap">+ Add</button>
      </div>
    </div>
    <table class="mat-table" id="matTable">
      <thead><tr>
        <th style="width:32%">Category</th><th style="width:28%">Item</th>
        <th style="width:10%">Qty</th><th style="width:12%">Unit Cost</th>
        <th style="width:10%">Amount</th><th style="width:3%"></th>
      </tr></thead>
      <tbody id="matBody"></tbody>
    </table>
    <div style="margin-top:10px"><button class="btn-ghost" onclick="addMatRow()">+ Add Row</button></div>
    <div class="total-bar">
      <div class="total-box">
        <div class="total-label">Total Project Quote</div>
        <div class="total-amount" id="grandTotal">$0.00</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Notes</h2>
    <textarea id="notes" rows="4" placeholder="Add any project notes, special instructions, or terms..."></textarea>
  </div>

  <div class="actions no-print">
    <button class="btn-ghost" onclick="clearAll()">🗑 Clear All</button>
    <button class="btn-green" onclick="exportPDF()">🖨 Export as PDF</button>
  </div>

</div>

<script>
let catalog=[
  {cat:"Labels",name:"Slap A Label",cost:0.20},
  {cat:"Labels",name:"3rd Party Shipping Label",cost:2.50},
  {cat:"Labels",name:"Packing Slip in Package",cost:0.20},
  {cat:"Labels",name:"Logo on Packing Slip",cost:0.15},
  {cat:"Poly Mailers",name:"White Poly Mailer PM 12x9",cost:0.58},
  {cat:"Poly Mailers",name:"White Poly Mailer PM 17x14",cost:0.86},
  {cat:"Poly Mailers",name:"White Poly Mailer PM 24x19",cost:1.15},
  {cat:"Poly Mailers",name:"Bubble Mailer BM 4x8",cost:0.23},
  {cat:"Poly Mailers",name:"Bubble Mailer BM 6x10",cost:0.35},
  {cat:"Poly Mailers",name:"Bubble Mailer BM 8.5x14.5",cost:0.52},
  {cat:"Poly Mailers",name:"Bubble Mailer BM 12.5x19",cost:0.58},
  {cat:"Poly Mailers",name:"Bubble Mailer (custom)",cost:0.20},
  {cat:"Boxes",name:"Standard Box 8x4x4",cost:0.40},
  {cat:"Boxes",name:"Standard Box 5x5x5",cost:0.55},
  {cat:"Boxes",name:"Standard Box 6x6x4",cost:0.40},
  {cat:"Boxes",name:"Standard Box 9x6x4",cost:0.52},
  {cat:"Boxes",name:"Standard Box 8x8x4",cost:0.58},
  {cat:"Boxes",name:"Standard Box 8x8x8",cost:0.86},
  {cat:"Boxes",name:"Standard Box 8x8x6",cost:0.58},
  {cat:"Boxes",name:"Standard Box 12x10x8",cost:1.15},
  {cat:"Boxes",name:"Standard Box 14x10x10",cost:1.10},
  {cat:"Boxes",name:"Standard Box 18x12x6",cost:1.44},
  {cat:"Boxes",name:"Standard Box 20x12x12",cost:2.50},
  {cat:"Boxes",name:"Standard Box 26x13x8",cost:2.78},
  {cat:"Boxes",name:"Standard Box 24x14x14",cost:3.28},
  {cat:"Boxes",name:"Standard Box 24x24x12",cost:2.88},
  {cat:"Boxes",name:"Custom Packaging",cost:0.50},
  {cat:"Cold Packaging",name:"Insulated Mailer 7x10",cost:2.83},
  {cat:"Cold Packaging",name:"Insulated Mailer 9x12",cost:3.74},
  {cat:"Cold Packaging",name:"Insulated Mailer 12x16",cost:5.28},
  {cat:"Cold Packaging",name:"Insulated Mailer 15x20",cost:7.80},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 6x6.5",cost:0.56},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 6.5x10.5",cost:0.91},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 8x11",cost:0.97},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 10x10.5",cost:1.20},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 11x15",cost:1.63},
  {cat:"Cold Packaging",name:"Cold Shield Bubble Mailer 12x17",cost:1.87},
  {cat:"Cold Packaging",name:"Moisture Resistant 6oz",cost:0.85},
  {cat:"Cold Packaging",name:"Moisture Resistant 8oz",cost:1.03},
  {cat:"Cold Packaging",name:"Moisture Resistant 12oz",cost:1.50},
  {cat:"Cold Packaging",name:"Moisture Resistant 16oz",cost:1.80},
  {cat:"Cold Packaging",name:"Moisture Resistant 24oz",cost:2.40},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 3oz",cost:0.32},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 6oz",cost:0.53},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 8oz",cost:0.62},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 12oz",cost:0.88},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 16oz",cost:1.09},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 24oz",cost:1.52},
  {cat:"Cold Packaging",name:"Single Use Cold Pack 32oz",cost:1.71},
  {cat:"Services",name:"Handling / Custom Docs",cost:5.00},
  {cat:"Services",name:"Pick Up / Drop Off at Atomix",cost:10.00},
  {cat:"Services",name:"Bill to 3rd Party",cost:5.00},
  {cat:"Services",name:"Temp Controlled Storage (per pallet/mo)",cost:50.00},
  {cat:"Services",name:"Fragile Items Extra Packaging",cost:0.50},
  {cat:"Services",name:"Gift Message",cost:1.00},
  {cat:"Services",name:"Handwritten Gift Note (per 100 chars)",cost:2.50},
  {cat:"Services",name:"Returns Handling",cost:3.00},
  {cat:"Services",name:"Returns Handling (additional items)",cost:1.00},
];
const CATEGORIES=["Labels","Poly Mailers","Boxes","Cold Packaging","Services","Other"];

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('date').value=new Date().toISOString().split('T')[0];
  addMatRow();calcTotals();renderMatMgr();
});

let rowId=0;
function addMatRow(skuVal='',descVal='',unitVal='',oqty='',sqty=''){
  const id=rowId++;
  const tr=document.createElement('tr');tr.id='row-'+id;
  tr.innerHTML=`<td><select onchange="onCatChange(${id},this.value)"><option value="">-- Category --</option>${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></td><td><select id="item-${id}" onchange="onItemChange(${id},this.value)"><option value="">-- Select item --</option></select></td><td><input type="number" id="qty-${id}" value="1" min="0" step="1" oninput="calcTotals()" style="width:60px"/></td><td><input type="number" id="unit-${id}" value="0" min="0" step="0.01" oninput="calcTotals()" style="width:72px"/></td><td id="amt-${id}" style="font-weight:600">$0.00</td><td><button class="btn-red" onclick="removeRow(${id})">✕</button></td>`;
  document.getElementById('matBody').appendChild(tr);
}
function onCatChange(id,cat){
  const sel=document.getElementById('item-'+id);
  const items=catalog.filter(m=>m.cat===cat);
  sel.innerHTML=`<option value="">-- Select item --</option>`+items.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')+`<option value="__custom__">Custom / Other</option>`;
  document.getElementById('unit-'+id).value='0';calcTotals();
}
function onItemChange(id,name){
  if(name==='__custom__')return;
  const found=catalog.find(m=>m.name===name);
  if(found)document.getElementById('unit-'+id).value=found.cost.toFixed(2);
  calcTotals();
}
function removeRow(id){document.getElementById('row-'+id)?.remove();calcTotals();}

function calcTotals(){
  const labor=(parseFloat(document.getElementById('hours').value)||0)*(parseFloat(document.getElementById('laborRate').value)||0);
  document.getElementById('laborTotal').value='$'+labor.toFixed(2);
  let matSum=0;
  document.querySelectorAll("[id^='qty-']").forEach(el=>{
    const id=el.id.replace('qty-','');
    const qty=parseFloat(el.value)||0;const unit=parseFloat(document.getElementById('unit-'+id)?.value)||0;
    const amt=qty*unit;matSum+=amt;
    const amtEl=document.getElementById('amt-'+id);if(amtEl)amtEl.textContent='$'+amt.toFixed(2);
  });
  document.getElementById('grandTotal').textContent='$'+(labor+matSum).toFixed(2);
}

function toggleMatMgr(){const el=document.getElementById('matMgr');el.style.display=el.style.display==='none'?'block':'none';renderMatMgr();}
function renderMatMgr(){
  document.getElementById('matMgrRows').innerHTML=catalog.map((m,i)=>`<div class="mat-mgr-row"><span style="font-size:10px;background:#e0f2fe;color:#0369a1;border-radius:4px;padding:2px 6px;white-space:nowrap;min-width:80px;text-align:center">${m.cat}</span><input value="${m.name}" onchange="catalog[${i}].name=this.value;rebuildDropdowns()" style="flex:3"/><input type="number" value="${m.cost}" step="0.01" onchange="catalog[${i}].cost=parseFloat(this.value)||0" style="max-width:80px"/><button class="btn-red" onclick="deleteCatalogItem(${i})">✕</button></div>`).join('');
}
function deleteCatalogItem(i){catalog.splice(i,1);renderMatMgr();rebuildDropdowns();}
function addCustomMat(){
  const cat=document.getElementById('newMatCat').value,name=document.getElementById('newMatName').value.trim(),cost=parseFloat(document.getElementById('newMatCost').value)||0;
  if(!name)return;catalog.push({cat,name,cost});document.getElementById('newMatName').value='';document.getElementById('newMatCost').value='';renderMatMgr();rebuildDropdowns();
}
function rebuildDropdowns(){
  document.querySelectorAll("[id^='item-']").forEach(sel=>{
    const id=sel.id.replace('item-','');const row=document.getElementById('row-'+id);if(!row)return;
    const catSel=row.querySelector('select');const cat=catSel?.value;if(!cat)return;
    const cur=sel.value;const items=catalog.filter(m=>m.cat===cat);
    sel.innerHTML=`<option value="">-- Select item --</option>`+items.map(m=>`<option value="${m.name}"${m.name===cur?' selected':''}>${m.name}</option>`).join('')+`<option value="__custom__">Custom / Other</option>`;
  });
}
function clearAll(){
  if(!confirm('Clear the entire quote?'))return;
  ['client','projRef','notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('hours').value=1;document.getElementById('laborRate').value=60;
  document.getElementById('matBody').innerHTML='';rowId=0;addMatRow();calcTotals();
}
function fmtDateStr(v){if(!v)return'';const[y,m,d]=v.split('-');return`${m}/${d}/${y.slice(2)}`;}
function exportPDF(){
  const client=document.getElementById('client').value||'—';
  const date=fmtDateStr(document.getElementById('date').value);
  const ref=document.getElementById('projRef').value||'—';
  const hours=document.getElementById('hours').value;
  const rate=parseFloat(document.getElementById('laborRate').value).toFixed(2);
  const laborTotal=document.getElementById('laborTotal').value;
  const notes=document.getElementById('notes').value;
  const grand=document.getElementById('grandTotal').textContent;
  let matRows='';
  document.querySelectorAll("[id^='qty-']").forEach(el=>{
    const id=el.id.replace('qty-','');
    const itemSel=document.getElementById('item-'+id);
    const name=itemSel?.value&&itemSel.value!=='__custom__'?itemSel.value:'';
    const qty=el.value;const unit=parseFloat(document.getElementById('unit-'+id)?.value)||0;
    const amt=(parseFloat(qty)||0)*unit;if(!name&&amt===0)return;
    matRows+=`<tr><td>${name||'Custom item'}</td><td>${qty} @ $${unit.toFixed(2)}/ea</td><td>$${amt.toFixed(2)}</td></tr>`;
  });
  const html=`<!DOCTYPE html><html><head><title>Quote — ${client}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:13px}.hdr{background:linear-gradient(135deg,#1a5c4a,#0d3d2e);color:white;padding:22px 32px;display:flex;align-items:center;gap:12px}.hdr-logo{width:32px;height:32px;border:2px solid #6ee7b7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:#6ee7b7}.hdr-name{font-size:20px;font-weight:700;letter-spacing:1px}.body{padding:32px}h1{font-size:20px;margin-bottom:18px}.meta{margin-bottom:22px;line-height:1.9}.meta b{font-weight:700}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#f3f4f6;padding:8px 12px;border:1px solid #d1d5db;text-align:left;font-size:12px}td{padding:8px 12px;border:1px solid #d1d5db}.total-row td:first-child{font-weight:700}.total-amt{background:#d1fae5;font-weight:700;color:#065f46;text-align:right}.notes{margin-top:16px}.notes h3{margin-bottom:8px}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="hdr"><div class="hdr-logo">⬡</div><span class="hdr-name">atomix</span></div><div class="body"><h1>Special Project Quote</h1><div class="meta"><div><b>Client:</b> ${client}</div><div><b>Date:</b> ${date}</div><div><b>Project Reference:</b> ${ref}</div></div><table><tr><th>Quoted Hours</th><th>Labor Rate</th><th>Labor Total</th></tr><tr><td>${hours}</td><td>$${rate}/hr</td><td>${laborTotal}</td></tr></table>${matRows?`<table><tr><th>Description</th><th>Details</th><th>Amount</th></tr>${matRows}</table>`:''}<table><tr class="total-row"><td colspan="2">Total Project Quote</td><td class="total-amt">${grand}</td></tr></table>${notes?`<div class="notes"><h3>Notes</h3><p>${notes.replace(/\n/g,'<br>')}</p></div>`:''}</div></body></html>`;

const w=window.open(’’,’_blank’);w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),500);
}
</script>

</body>
</html>
