<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atomix — Order Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c12;--bg2:#0d1520;--bg3:#112030;--bg4:#172840;
  --border:#1a2d42;--border2:#203550;
  --green:#3EBD84;--green-dim:#071a10;--green-glow:rgba(62,189,132,0.2);
  --teal:#2dd4bf;--teal-dim:#071a18;
  --blue:#4A9FD4;--blue-dim:#091828;
  --amber:#f59e0b;--amber-dim:#1a1200;
  --red:#f87171;--red-dim:#1a0808;
  --purple:#a78bfa;--purple-dim:#100c20;
  --text:#e8f4ff;--text2:#6a90b0;--text3:#2d4a62;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* Animated background */
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.bg-glow{position:fixed;z-index:0;pointer-events:none}
.glow1{width:700px;height:500px;background:radial-gradient(circle,rgba(62,189,132,0.07),transparent 70%);top:-100px;left:-100px;border-radius:50%}
.glow2{width:600px;height:600px;background:radial-gradient(circle,rgba(74,159,212,0.06),transparent 70%);bottom:-100px;right:-100px;border-radius:50%}
.glow3{width:400px;height:400px;background:radial-gradient(circle,rgba(167,139,250,0.05),transparent 70%);top:40%;left:40%;transform:translate(-50%,-50%);border-radius:50%}

/* Top bar */
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(7,12,18,0.9);backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--green)}
.page-title{font-size:13px;font-weight:600;color:var(--text2)}
.topbar-center{display:flex;align-items:center;gap:8px}
.person-filter-wrap{display:flex;align-items:center;gap:8px}
.filter-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.person-tabs{display:flex;gap:6px;flex-wrap:wrap}
.person-tab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.person-tab:hover{border-color:var(--teal);color:var(--teal)}
.person-tab.active{color:#070c12;border-color:transparent}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(62,189,132,0.4)}50%{opacity:.8;box-shadow:0 0 0 6px rgba(62,189,132,0)}}
.live-label{font-size:11px;font-weight:700;color:var(--green)}
.clock{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--text2)}
.mgmt-link{font-size:11px;font-weight:700;color:var(--text3);text-decoration:none;padding:5px 12px;border:1px solid var(--border2);border-radius:20px;transition:all .2s}
.mgmt-link:hover{color:var(--teal);border-color:var(--teal)}

/* Main layout */
.main{position:relative;z-index:1;padding:20px 24px 40px;max-width:1600px;margin:0 auto}

/* Header section — today's summary */
.today-banner{background:linear-gradient(135deg,rgba(62,189,132,0.06),rgba(45,212,191,0.04),rgba(74,159,212,0.06));border:1px solid rgba(62,189,132,0.15);border-radius:20px;padding:20px 28px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.today-left h2{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.today-left p{font-size:13px;color:var(--text2)}
.today-stats{display:flex;gap:20px;flex-wrap:wrap}
.today-stat{text-align:center}
.today-stat-val{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;line-height:1}
.today-stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.stat-tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 18px;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-tile.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.stat-tile.amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.stat-tile.red::before{background:linear-gradient(90deg,var(--red),transparent)}
.stat-tile.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.stat-tile.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.stat-tile-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-tile-val{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}

/* Two-column layout */
.content-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-bottom:22px}

/* Pipeline section */
.pipeline-wrap{}
.pipeline-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pipeline-col{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.col-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.col-name{font-size:12px;font-weight:700;flex:1;letter-spacing:.02em}
.col-badge{font-size:11px;font-weight:800;padding:2px 9px;border-radius:12px}
.col-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:100px}
.order-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px;transition:all .2s;animation:cardIn .3s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.order-card.highlight{border-color:var(--teal);box-shadow:0 0 20px rgba(45,212,191,0.1)}
.oc-client{font-size:14px;font-weight:800;margin-bottom:2px;letter-spacing:-.2px}
.oc-po{font-size:11px;color:var(--text2);margin-bottom:6px}
.oc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.oc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.tag-ok{background:rgba(45,212,191,0.1);color:var(--teal)}
.tag-warn{background:rgba(245,158,11,0.12);color:var(--amber)}
.tag-over{background:rgba(248,113,113,0.12);color:var(--red)}
.tag-person{border-radius:20px;font-size:10px;font-weight:700;padding:2px 8px}
.empty-state{font-size:12px;color:var(--text3);text-align:center;padding:24px 10px;font-style:italic}

/* Right sidebar */
.sidebar{}
.sidebar-block{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px}
.sb-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-icon{font-size:14px}
.sb-title{font-size:12px;font-weight:700;flex:1}
.sb-body{padding:12px 16px}

/* Team assignment cards */
.person-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.person-card:last-child{margin-bottom:0}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.pc-name{font-size:14px;font-weight:700}
.pc-count{font-size:11px;font-weight:600;margin-left:auto}
.pc-orders{display:flex;flex-direction:column;gap:4px}
.pc-order-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-top:1px solid var(--border)}
.pc-order-row:first-child{border-top:none}
.pc-order-brand{font-size:12px;font-weight:600;flex:1}
.pc-order-stage{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.pc-order-due{font-size:10px;font-weight:700}

/* Weekly strip */
.week-strip{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:22px}
.ws-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ws-title{font-size:13px;font-weight:700}
.ws-nav{display:flex;align-items:center;gap:8px}
.ws-nav button{border:1px solid var(--border2);background:var(--bg3);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text);font-family:'Inter',sans-serif}
.ws-nav button:hover{background:var(--bg4)}
.ws-label{font-size:11px;font-weight:600;color:var(--text2);min-width:150px;text-align:center}
.ws-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-top:1px solid var(--border)}
.ws-day{border-right:1px solid var(--border);min-height:90px}
.ws-day:last-child{border-right:none}
.ws-day-head{padding:6px 8px;border-bottom:1px solid var(--border);background:var(--bg3);text-align:center}
.ws-day-name{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.ws-day-date{font-size:12px;font-weight:700;color:var(--text2)}
.ws-day.today .ws-day-head{background:var(--green-dim)}
.ws-day.today .ws-day-name{color:var(--green)}
.ws-day.today .ws-day-date{color:var(--green)}
.ws-chips{padding:6px;display:flex;flex-direction:column;gap:3px}
.ws-chip{font-size:9px;font-weight:700;padding:3px 5px;border-radius:5px;border:1px solid transparent;line-height:1.3;cursor:default}
.ws-chip-name{display:block;opacity:.6;font-size:8px}

/* Type breakdown */
.type-bars{display:flex;flex-direction:column;gap:8px}
.type-bar-row{display:flex;align-items:center;gap:10px}
.type-bar-label{font-size:11px;font-weight:600;color:var(--text2);width:90px;flex-shrink:0}
.type-bar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.type-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.type-bar-count{font-size:11px;font-weight:700;color:var(--text2);width:20px;text-align:right;flex-shrink:0}

/* Overdue alert */
.overdue-alert{background:linear-gradient(135deg,rgba(248,113,113,0.08),transparent);border:1px solid rgba(248,113,113,0.2);border-radius:16px;padding:14px 18px;margin-bottom:22px;display:none}
.overdue-alert.show{display:block}
.oa-title{font-size:13px;font-weight:800;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.oa-cards{display:flex;flex-wrap:wrap;gap:8px}
.oa-card{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:8px 12px;min-width:160px}
.oa-card-client{font-size:13px;font-weight:700}
.oa-card-meta{font-size:11px;color:var(--red);font-weight:600}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:1200px){.content-grid{grid-template-columns:1fr}.sidebar{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stats-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.pipeline-cols{grid-template-columns:1fr}.stats-strip{grid-template-columns:repeat(2,1fr)}.ws-grid{grid-template-columns:repeat(4,1fr)}.person-tabs{gap:4px}.person-tab{padding:5px 10px;font-size:11px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"><div class="glow1"></div><div class="glow2"></div><div class="glow3"></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const app = initializeApp({
    apiKey:"AIzaSyCXWwp346vnAQmarUYocvb7DSTana0jNwA",
    authDomain:"atomix-tools.firebaseapp.com",
    projectId:"atomix-tools",
    storageBucket:"atomix-tools.firebasestorage.app",
    messagingSenderId:"211594945190",
    appId:"1:211594945190:web:bf70681d9335816984ca67"
  });
  const db=getFirestore(app);
  window._fsOnSnapshot=onSnapshot;window._fsDoc=doc;window._firestore=db;window._firestoreReady=true;
  window.dispatchEvent(new Event('firestore-ready'));
</script>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">atomix<span>.</span></div>
    <div class="page-title">Order Display</div>
  </div>
  <div class="topbar-center">
    <div class="person-filter-wrap">
      <span class="filter-label">View:</span>
      <div class="person-tabs" id="personTabs"></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span class="live-label">Live</span>
    <span class="clock" id="clock"></span>
    <a href="retail-dashboard.html" class="mgmt-link">⚙ Manage</a>
  </div>
</div>

<div class="main">
  <!-- Overdue alert banner -->
  <div class="overdue-alert" id="overdueAlert">
    <div class="oa-title">⚠️ Overdue Orders — Needs Attention</div>
    <div class="oa-cards" id="overdueCards"></div>
  </div>

  <!-- Today banner -->
  <div class="today-banner">
    <div class="today-left">
      <h2 id="todayHeading">Today's Orders</h2>
      <p id="todaySubheading">Loading…</p>
    </div>
    <div class="today-stats" id="todayStats"></div>
  </div>

  <!-- Stats strip -->
  <div class="stats-strip" id="statsStrip"></div>

  <!-- Content grid: pipeline + sidebar -->
  <div class="content-grid">
    <div class="pipeline-wrap">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:10px">Active Pipeline <span style="flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)"></span></div>
      <div class="pipeline-cols" id="pipelineCols"></div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>

  <!-- Weekly strip -->
  <div class="week-strip">
    <div class="ws-head">
      <div class="ws-title">📅 This Week</div>
      <div class="ws-nav">
        <button id="wPrev">←</button>
        <div class="ws-label" id="weekLabel"></div>
        <button id="wNext">→</button>
      </div>
    </div>
    <div class="ws-grid" id="weekGrid"></div>
  </div>
</div>

<script>
const STAGES=['Incoming / Received','In Prep','Staged / Ready'];
const STAGE_COLORS={'Incoming / Received':'#3b82f6','In Prep':'#f59e0b','Staged / Ready':'#8b5cf6'};
const STAGE_SHORT={'Incoming / Received':'Incoming','In Prep':'In Prep','Staged / Ready':'Staged'};
const MEMBER_COLORS=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#f87171','#2dd4bf','#fb923c','#a78bfa','#34d399','#60a5fa'];
const TYPE_COLORS={'B2B':'#3b82f6','Retail':'#10b981','DTC':'#f59e0b','Amazon FBA':'#8b5cf6','Special Project':'#f87171'};

let orders=[], team=[], selectedPerson='All', weekOffset=0;

// ── Clock ─────────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,1000);

// ── Firebase live ─────────────────────────────────────────────────
function initLive(){
  window._fsOnSnapshot(window._fsDoc(window._firestore,'atomix','retail_dashboard'),snap=>{
    if(snap.exists()){
      const d=snap.data();
      orders=d.orders||[];
      team=d.team?.length?d.team:['Edwin','Maria Luna'];
      renderAll();
    }
  });
}
if(window._firestoreReady){initLive();}
else{window.addEventListener('firestore-ready',initLive,{once:true});}

// ── Helpers ───────────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0];}
function daysUntil(s){if(!s)return null;return Math.ceil((new Date(s)-new Date(today()))/86400000);}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${m}/${d}/${y.slice(2)}`;}
function memberColor(name){if(!name)return'#6b7280';const idx=team.indexOf(name);return MEMBER_COLORS[idx>=0?idx%MEMBER_COLORS.length:0];}
function ini(n){return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function dueTag(dueDate){
  const days=daysUntil(dueDate);
  if(days===null)return{cls:'tag-ok',txt:'No due date'};
  if(days<0)return{cls:'tag-over',txt:`Overdue ${Math.abs(days)}d`};
  if(days===0)return{cls:'tag-warn',txt:'Due Today'};
  if(days===1)return{cls:'tag-warn',txt:'Due Tomorrow'};
  return{cls:'tag-ok',txt:`Due ${fmtDate(dueDate)}`};
}

function filteredOrders(){
  const active=orders.filter(o=>STAGES.includes(o.stage));
  if(selectedPerson==='All')return active;
  if(selectedPerson==='Unassigned')return active.filter(o=>!o.assignee);
  return active.filter(o=>o.assignee===selectedPerson);
}

// ── Person tabs ───────────────────────────────────────────────────
function renderTabs(){
  const tabs=document.getElementById('personTabs');
  const people=['All',...team,'Unassigned'];
  tabs.innerHTML=people.map(p=>{
    const isActive=p===selectedPerson;
    const mc=p==='All'?'var(--teal)':p==='Unassigned'?'var(--text3)':memberColor(p);
    return`<button class="person-tab${isActive?' active':''}" 
      style="${isActive?`background:${mc};color:#070c12`:`color:${mc};border-color:${mc}44`}"
      onclick="selectPerson('${p}')">${p==='All'?'👁 All':p==='Unassigned'?'— Unassigned':p}</button>`;
  }).join('');
}
function selectPerson(p){selectedPerson=p;renderAll();}

// ── Today banner ──────────────────────────────────────────────────
function renderTodayBanner(){
  const fo=filteredOrders();
  const todayStr=today();
  const dueToday=fo.filter(o=>o.dueDate===todayStr);
  const overdue=fo.filter(o=>{const d=daysUntil(o.dueDate);return d!==null&&d<0;});
  const upcoming=fo.filter(o=>{const d=daysUntil(o.dueDate);return d!==null&&d>0&&d<=7;});

  const now=new Date();
  const dayName=now.toLocaleDateString(undefined,{weekday:'long'});
  const dateStr=now.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'});
  const heading=selectedPerson==='All'?`${dayName}'s Overview`:selectedPerson==='Unassigned'?'Unassigned Orders':`${selectedPerson}'s Day`;
  document.getElementById('todayHeading').textContent=heading;
  document.getElementById('todaySubheading').textContent=dateStr+' · '+fo.length+' active order'+(fo.length!==1?'s':'');

  document.getElementById('todayStats').innerHTML=`
    <div class="today-stat"><div class="today-stat-val" style="color:var(--teal)">${fo.length}</div><div class="today-stat-label">Active</div></div>
    <div class="today-stat"><div class="today-stat-val" style="color:var(--amber)">${dueToday.length}</div><div class="today-stat-label">Due Today</div></div>
    <div class="today-stat"><div class="today-stat-val" style="color:var(--red)">${overdue.length}</div><div class="today-stat-label">Overdue</div></div>
    <div class="today-stat"><div class="today-stat-val" style="color:var(--blue)">${upcoming.length}</div><div class="today-stat-label">This Week</div></div>`;
}

// ── Stats strip ───────────────────────────────────────────────────
function renderStats(){
  const fo=filteredOrders();
  const todayStr=today();
  const stageCounts=STAGES.map(s=>fo.filter(o=>o.stage===s).length);
  const typeCounts={};fo.forEach(o=>{typeCounts[o.type]=(typeCounts[o.type]||0)+1;});
  const topType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('statsStrip').innerHTML=`
    <div class="stat-tile blue"><div class="stat-tile-label">Incoming</div><div class="stat-tile-val" style="color:var(--blue)">${stageCounts[0]}</div></div>
    <div class="stat-tile amber"><div class="stat-tile-label">In Prep</div><div class="stat-tile-val" style="color:var(--amber)">${stageCounts[1]}</div></div>
    <div class="stat-tile purple"><div class="stat-tile-label">Staged / Ready</div><div class="stat-tile-val" style="color:var(--purple)">${stageCounts[2]}</div></div>
    <div class="stat-tile green"><div class="stat-tile-label">Due Today</div><div class="stat-tile-val" style="color:var(--green)">${fo.filter(o=>o.dueDate===todayStr).length}</div></div>
    <div class="stat-tile red"><div class="stat-tile-label">Top Type</div><div class="stat-tile-val" style="color:var(--teal);font-size:16px;padding-top:4px">${topType?topType[0]:'—'}</div></div>`;
}

// ── Overdue alert ─────────────────────────────────────────────────
function renderOverdue(){
  const fo=filteredOrders();
  const overdue=fo.filter(o=>{const d=daysUntil(o.dueDate);return d!==null&&d<0;});
  const el=document.getElementById('overdueAlert');
  el.classList.toggle('show',overdue.length>0);
  if(overdue.length){
    document.getElementById('overdueCards').innerHTML=overdue.map(o=>`
      <div class="oa-card">
        <div class="oa-card-client">${o.brand}</div>
        <div class="oa-card-meta">${o.po||'No PO'} · ${Math.abs(daysUntil(o.dueDate))}d overdue${o.assignee?` · ${o.assignee}`:''}</div>
      </div>`).join('');
  }
}

// ── Pipeline ──────────────────────────────────────────────────────
function renderPipeline(){
  const fo=filteredOrders();
  const el=document.getElementById('pipelineCols');el.innerHTML='';
  STAGES.forEach(stage=>{
    const col=STAGE_COLORS[stage];
    const stageOrders=fo.filter(o=>o.stage===stage);
    const div=document.createElement('div');div.className='pipeline-col';
    div.innerHTML=`<div class="col-header">
      <div class="col-dot" style="color:${col};background:${col}"></div>
      <div class="col-name">${stage}</div>
      <span class="col-badge" style="background:${col}18;color:${col}">${stageOrders.length}</span>
    </div><div class="col-cards" id="pcol-${stage.replace(/[\s\/]+/g,'-')}"></div>`;
    el.appendChild(div);
    const body=div.querySelector('.col-cards');
    if(!stageOrders.length){body.innerHTML='<div class="empty-state">No orders</div>';return;}
    stageOrders.forEach(o=>{
      const {cls,txt}=dueTag(o.dueDate);
      const mc=memberColor(o.assignee);
      const isHighlight=o.dueDate===today();
      const card=document.createElement('div');card.className='order-card'+(isHighlight?' highlight':'');
      card.innerHTML=`
        <div class="oc-client">${o.brand}</div>
        <div class="oc-po">${o.po||'No PO #'}</div>
        <div class="oc-meta">
          <span class="oc-tag ${cls}">${txt}</span>
          ${o.assignee?`<span class="tag-person" style="background:${mc}18;color:${mc};border:1px solid ${mc}33">👤 ${o.assignee}</span>`:'<span class="oc-tag" style="background:var(--bg4);color:var(--text3)">Unassigned</span>'}
        </div>`;
      body.appendChild(card);
    });
  });
}

// ── Sidebar ───────────────────────────────────────────────────────
function renderSidebar(){
  const fo=filteredOrders();
  const el=document.getElementById('sidebar');el.innerHTML='';

  // Team assignments block
  const teamBlock=document.createElement('div');teamBlock.className='sidebar-block';
  const peopleToShow=selectedPerson==='All'?team:selectedPerson==='Unassigned'?[]:team.filter(m=>m===selectedPerson);
  let teamHTML=`<div class="sb-head"><span class="sb-icon">👥</span><span class="sb-title">Team Assignments</span></div><div class="sb-body">`;
  if(peopleToShow.length===0&&selectedPerson==='Unassigned'){
    const uOrders=fo;
    teamHTML+=`<div class="person-card"><div class="pc-top"><div class="pc-avatar" style="background:var(--bg4);color:var(--text3)">?</div><div class="pc-name">Unassigned</div><span class="pc-count" style="color:var(--text3)">${uOrders.length} orders</span></div><div class="pc-orders">`;
    uOrders.slice(0,5).forEach(o=>{
      const {cls,txt}=dueTag(o.dueDate);const sc=STAGE_COLORS[o.stage];
      teamHTML+=`<div class="pc-order-row"><div class="pc-order-brand">${o.brand}</div><span class="pc-order-stage" style="background:${sc}18;color:${sc}">${STAGE_SHORT[o.stage]}</span><span class="pc-order-due oc-tag ${cls}" style="font-size:9px">${txt}</span></div>`;
    });
    if(uOrders.length>5)teamHTML+=`<div style="font-size:10px;color:var(--text3);padding-top:4px">+${uOrders.length-5} more</div>`;
    teamHTML+='</div></div>';
  } else {
    peopleToShow.forEach((member,i)=>{
      const mc=memberColor(member);
      const myOrders=orders.filter(o=>o.assignee===member&&STAGES.includes(o.stage));
      teamHTML+=`<div class="person-card"><div class="pc-top"><div class="pc-avatar" style="background:${mc}18;color:${mc}">${ini(member)}</div><div class="pc-name">${member}</div><span class="pc-count" style="color:${mc}">${myOrders.length} order${myOrders!==1?'s':''}</span></div>`;
      if(myOrders.length){
        teamHTML+='<div class="pc-orders">';
        myOrders.slice(0,4).forEach(o=>{
          const {cls,txt}=dueTag(o.dueDate);const sc=STAGE_COLORS[o.stage];
          teamHTML+=`<div class="pc-order-row"><div class="pc-order-brand">${o.brand}</div><span class="pc-order-stage" style="background:${sc}18;color:${sc}">${STAGE_SHORT[o.stage]}</span><span class="pc-order-due oc-tag ${cls}" style="font-size:9px">${txt}</span></div>`;
        });
        if(myOrders.length>4)teamHTML+=`<div style="font-size:10px;color:var(--text3);padding-top:4px">+${myOrders.length-4} more</div>`;
        teamHTML+='</div>';
      } else {
        teamHTML+='<div style="font-size:12px;color:var(--text3);padding-top:4px;font-style:italic">No active orders</div>';
      }
      teamHTML+='</div>';
    });
  }
  teamHTML+='</div>';
  teamBlock.innerHTML=teamHTML;
  el.appendChild(teamBlock);

  // Order type breakdown
  const typeCounts={};fo.forEach(o=>{typeCounts[o.type]=(typeCounts[o.type]||0)+1;});
  const maxType=Math.max(1,...Object.values(typeCounts));
  const typeBlock=document.createElement('div');typeBlock.className='sidebar-block';
  let typeHTML=`<div class="sb-head"><span class="sb-icon">📊</span><span class="sb-title">Order Types</span></div><div class="sb-body"><div class="type-bars">`;
  Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).forEach(([type,cnt])=>{
    const col=TYPE_COLORS[type]||'var(--teal)';const pct=Math.round(cnt/maxType*100);
    typeHTML+=`<div class="type-bar-row"><div class="type-bar-label">${type}</div><div class="type-bar-track"><div class="type-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="type-bar-count" style="color:${col}">${cnt}</div></div>`;
  });
  if(!Object.keys(typeCounts).length)typeHTML+='<div style="font-size:12px;color:var(--text3);font-style:italic">No active orders</div>';
  typeHTML+='</div></div>';
  typeBlock.innerHTML=typeHTML;
  el.appendChild(typeBlock);
}

// ── Weekly ────────────────────────────────────────────────────────
function getWeekDays(offset){
  const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1)+(offset*7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}
function renderWeek(){
  const days=getWeekDays(weekOffset);
  const mon=days[0],sun=days[6];
  document.getElementById('weekLabel').textContent=`${mon.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${sun.toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;
  const grid=document.getElementById('weekGrid');grid.innerHTML='';
  const todayStr=today();
  const fo=filteredOrders();
  days.forEach(d=>{
    const ds=d.toISOString().split('T')[0];const isToday=ds===todayStr;
    const dayOrders=fo.filter(o=>o.dueDate===ds);
    const col=document.createElement('div');col.className='ws-day'+(isToday?' today':'');
    col.innerHTML=`<div class="ws-day-head"><div class="ws-day-name">${d.toLocaleDateString(undefined,{weekday:'short'})}</div><div class="ws-day-date">${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div></div><div class="ws-chips"></div>`;
    grid.appendChild(col);
    const chips=col.querySelector('.ws-chips');
    dayOrders.forEach(o=>{
      const sc=STAGE_COLORS[o.stage]||'#6b7280';
      const mc=memberColor(o.assignee);
      const chip=document.createElement('div');chip.className='ws-chip';
      chip.style.cssText=`background:${sc}18;color:${sc};border-color:${sc}33`;
      chip.innerHTML=`${o.brand||'—'}${o.assignee?`<span class="ws-chip-name" style="color:${mc}">${o.assignee}</span>`:''}`;
      chips.appendChild(chip);
    });
    if(!dayOrders.length){chips.innerHTML='<div style="font-size:10px;color:var(--text3);text-align:center;padding:8px 0">—</div>';}
  });
}

document.getElementById('wPrev').addEventListener('click',()=>{weekOffset--;renderWeek();});
document.getElementById('wNext').addEventListener('click',()=>{weekOffset++;renderWeek();});

function renderAll(){
  renderTabs();renderTodayBanner();renderStats();renderOverdue();renderPipeline();renderSidebar();renderWeek();
}
</script>
</body>
</html>
